<div class="auth-container">
  @if (!success) {
    <div class="auth-card">
      <h2>Nueva contraseña</h2>
      <p>Introduce tu nueva contraseña.</p>

      <input
        type="password"
        [(ngModel)]="password"
        placeholder="Nueva contraseña"
        class="auth-input"
      />

      <input
        type="password"
        [(ngModel)]="confirm"
        placeholder="Confirmar contraseña"
        class="auth-input"
      />

      <p class="error" *ngIf="error">{{ error }}</p>

      <button class="auth-btn" (click)="submit()" [disabled]="loading || !token">
        {{ loading ? 'Guardando...' : 'Cambiar contraseña' }}
      </button>
    </div>
  } @else {
    <div class="auth-card">
      <h2>✅ Contraseña actualizada</h2>
      <p>Redirigiendo al login en unos segundos...</p>
    </div>
  }
</div>
