<div class="auth-container">
  @if (!sent) {
    <div class="auth-card">
      <h2>¿Olvidaste tu contraseña?</h2>
      <p>Introduce tu email y te enviaremos un enlace para restablecerla.</p>

      <input
        type="email"
        [(ngModel)]="email"
        placeholder="tu@email.com"
        class="auth-input"
      />

      <p class="error" *ngIf="error">{{ error }}</p>

      <button class="auth-btn" (click)="submit()" [disabled]="loading">
        {{ loading ? 'Enviando...' : 'Enviar enlace' }}
      </button>
    </div>
  } @else {
    <div class="auth-card">
      <h2>✅ Email enviado</h2>
      <p>Si el email está registrado, recibirás un enlace en tu bandeja de entrada.</p>
    </div>
  }
</div>
