<div class="wishlist-container">
  <div class="wishlist-header">
    <h2>
      {{ userName === 'My' ? 'My Wishlist' : userName + "'s Wishlist" }}
    </h2>

    <button class="btn-filters" (click)="toggleFilters()">
      {{ showFilters ? 'Hide Filters' : 'Filters' }}
    </button>
  </div>

  <div class="filters-wrapper" [class.open]="showFilters">
    <app-filters
      [genres]="availableGenres"
      [platforms]="availablePlatforms"
      (filtersChanged)="onFiltersChanged($event)"
    ></app-filters>
  </div>

  <div *ngIf="loading">
    <p>Cargando juegos...</p>
  </div>

  <div *ngIf="error && !loading">
    <p class="error">{{ error }}</p>
  </div>

  <div *ngIf="!loading && wishlist.length === 0 && !error">
    <p>No games yet.</p>
  </div>

  <div *ngIf="!loading && wishlist.length > 0" class="wishlist-grid">
    <app-game-card
      *ngFor="let game of wishlist; trackBy: trackById"
      [game]="game"
      [initialBookmarked]="true"
      (bookmarkToggled)="removeFromWishlist(game)"
    ></app-game-card>
  </div>
</div>
